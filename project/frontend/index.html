    <meta charset="UTF-8" />

    <meta http-equiv="Pragma" content="no-cache" />

    <title>Noobies</title>
    <script>
      ;(() => {
        const isLocalHost =
          window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        const pathSegments = window.location.pathname.split('/').filter(Boolean)
        const isGitHubPages = window.location.hostname.endsWith('.github.io')
        const basePath = isGitHubPages && pathSegments.length ? `/${pathSegments[0]}` : ''
        const routeSegments = isGitHubPages ? pathSegments.slice(1) : pathSegments
        const routePath = routeSegments.length ? `/${routeSegments.join('/')}` : '/'

        if (!window.location.hash && routePath !== '/') {
          const nextHash = routePath === '/' ? '#/' : `#${routePath}`
          const nextUrl = `${window.location.origin}${basePath}/${nextHash}${window.location.search}`
          window.location.replace(nextUrl)
          return
        }

        if (isLocalHost) {
          window.localStorage.setItem('typing-api-base', 'http://127.0.0.1:5000/api')
        }
      })()
    </script>
